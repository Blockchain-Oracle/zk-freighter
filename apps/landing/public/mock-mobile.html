<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="color-scheme" content="dark">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box}html,body{margin:0;background:transparent !important}body{-webkit-font-smoothing:antialiased;overflow:hidden}
@keyframes zkSpin{to{transform:rotate(360deg)}}
@keyframes zkPulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes zkDash{to{stroke-dashoffset:0}}
@keyframes zkPop{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes zkSheen{0%{transform:translateX(-140%) skewX(-18deg)}55%,100%{transform:translateX(360%) skewX(-18deg)}}

  *{box-sizing:border-box}
  body{margin:0;-webkit-font-smoothing:antialiased}
  @keyframes zkSheen{0%{transform:translateX(-140%) skewX(-18deg)}55%,100%{transform:translateX(360%) skewX(-18deg)}}
  @keyframes zkPulse{0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes zkSpin{to{transform:rotate(360deg)}}
  @keyframes zkScanline{0%{transform:translateY(0)}100%{transform:translateY(166px)}}
  @keyframes zkReticle{0%,100%{box-shadow:0 0 0 1px rgba(94,124,250,.25)}50%{box-shadow:0 0 0 1px rgba(94,124,250,.6)}}
  .zkscroll::-webkit-scrollbar{display:none}
  .phone{width:288px;flex:none;height:604px;background:#000;border:8px solid #1c1d22;border-radius:42px;box-shadow:0 44px 100px -40px #000, 0 0 0 1px rgba(255,255,255,.05);overflow:hidden;position:relative;display:flex;flex-direction:column}
  .pstat{position:relative;z-index:3;display:flex;align-items:center;padding:12px 22px 5px;font:600 11.5px/1 var(--sans);color:var(--tx)}
  .pstat .notch{position:absolute;left:50%;top:7px;transform:translateX(-50%);width:78px;height:22px;background:#000;border-radius:0 0 15px 15px}
  .phd{display:flex;align-items:center;gap:9px;padding:9px 16px 11px}
  .phd .bk{font-size:14px;color:var(--tx2);cursor:pointer}
  .phd .t{font:700 15px/1 var(--sans);color:var(--tx)}
  .pbody{flex:1;overflow-y:auto;padding:4px 16px 0}
  .ptab{position:relative;z-index:3;display:flex;align-items:center;justify-content:space-around;padding:11px 14px 18px;border-top:1px solid var(--bd);background:rgba(16,17,22,.92)}
  .ti{display:flex;flex-direction:column;align-items:center;gap:4px;font:600 8.5px/1 var(--sans)}
  .lab{font:600 11px/1 var(--fm);letter-spacing:.13em;color:var(--tx3);margin:0 0 14px 2px}
  .bnd{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;font:600 8.5px/1 var(--fm);letter-spacing:.09em;white-space:nowrap}
  .bnd.sh{border:1px solid rgba(94,124,250,.5);background:rgba(94,124,250,.14);color:var(--ac2)}
  .bnd.pb{border:1px solid rgba(229,180,92,.42);background:rgba(229,180,92,.1);color:var(--warn)}
  .bnd.rv{border:1px solid rgba(229,103,92,.45);background:rgba(229,103,92,.1);color:var(--dng)}
  .bnd.tn{border:1px solid var(--bd2);background:var(--card2);color:var(--tx2)}
  .seg{display:flex;gap:5px;padding:4px;background:var(--card);border:1px solid var(--bd);border-radius:11px}
  .seg span{flex:1;text-align:center;padding:8px 4px;border-radius:8px;font:600 11px/1 var(--sans);cursor:pointer;color:var(--tx2)}
  .seg span.on{background:var(--ac);color:#fff}
  .prim{padding:13px;border:none;border-radius:12px;background:var(--ac);color:#fff;font:700 13px/1 var(--sans);cursor:pointer;text-align:center;box-shadow:0 12px 26px -12px rgba(94,124,250,.8)}
  .prim.dng{background:var(--dng);box-shadow:0 12px 26px -12px rgba(229,103,92,.7)}
  .ghost{padding:13px;border:1px solid var(--bd2);border-radius:12px;background:transparent;color:var(--tx2);font:600 12px/1 var(--sans);cursor:pointer;text-align:center}
  .fld{border:1px solid var(--bd2);border-radius:11px;background:var(--card);padding:11px 13px;font:600 12px/1.3 var(--sans);color:var(--tx)}
  .amt{border:1px solid var(--bd2);border-radius:13px;background:var(--card);padding:16px;display:flex;align-items:center;justify-content:center;gap:8px}
  .amt b{font:600 30px/1 var(--fm);color:var(--tx);font-weight:600}
  .amt i{font:600 11px/1 var(--sans);color:var(--tx3);font-style:normal;align-self:flex-end;margin-bottom:5px}
  .rev{display:flex;align-items:center;padding:11px 0;border-top:1px solid var(--bd);font-size:12px;color:var(--tx2)}
  .rev b{margin-left:auto;font-family:var(--fm);font-size:11.5px;color:var(--tx);font-weight:600}
  .chip{padding:8px 13px;border-radius:9px;border:1px solid var(--bd2);background:var(--card);font:600 11px/1 var(--sans);cursor:pointer;color:var(--tx2)}
  .chip.on{background:var(--ac);border-color:var(--ac);color:#fff}
  .sd{width:17px;height:17px;border-radius:50%;flex:none;display:grid;place-items:center;font-size:9px}
  .sd.done{background:rgba(53,199,123,.18);border:1px solid rgba(53,199,123,.45);color:var(--pos)}
  .sd.act{background:rgba(94,124,250,.2);border:1px solid var(--ac)}
  .sd.todo{border:1px solid var(--bd2)}
  .lg{width:26px;height:26px;border-radius:50%;overflow:hidden;display:flex;border:1px solid rgba(255,255,255,.1);flex:none}
  .lg .a{flex:1;background:#1b1a24}.lg .b{flex:1;background:linear-gradient(135deg,#8a9bff,#5E7CFA)}
  .cap{width:210px;flex:none;align-self:center;color:var(--tx2)}
  .cap .h{font:600 10px/1 var(--fm);letter-spacing:.12em;color:var(--ac2);margin-bottom:9px}
  .cap p{font:400 12.5px/1.6 var(--sans);color:var(--tx2);margin:0}
  .cap b{color:var(--tx)}
</style></head>
<body><div style="--bg:#0c0d0f; --panel:#141519; --card:#1a1c22; --card2:#202329; --bd:rgba(255,255,255,.07); --bd2:rgba(255,255,255,.13); --tx:#f3f4f6; --tx2:#9aa0a9; --tx3:#6a6f79; --ac:#5E7CFA; --ac2:#9aa6ff; --pos:#35C77B; --warn:#E5B45C; --dng:#E5675C; --fm:'IBM Plex Mono',ui-monospace,monospace; --sans:'Hanken Grotesk',system-ui,sans-serif; font-family:var(--sans); display:inline-flex; align-items:flex-start;">
<div class="phone">
        <div class="pstat"><span class="notch"></span><span style="font-family:var(--fm);">9:41</span><span style="margin-left:auto; font-size:11px; color:var(--tx2);">5G ▪▮</span></div>
        <div class="phd"><span class="bk">‹</span><span class="t">Send</span><span class="bnd sh" style="margin-left:auto;"><span style="width:6px; height:6px; border:1.2px solid var(--ac2); transform:rotate(45deg);"></span>SHIELDED</span></div>
        <div class="pbody zkscroll" style="display:flex; flex-direction:column;">
          <div style="display:flex; flex-direction:column; align-items:center; text-align:center; padding:24px 6px 16px;">
            <div style="width:62px; height:62px; border-radius:50%; background:radial-gradient(circle, rgba(53,199,123,.28), rgba(53,199,123,.06)); border:1.5px solid rgba(53,199,123,.5); display:grid; place-items:center; font-size:28px; color:var(--pos);">✓</div>
            <div style="font:800 17px/1.2 var(--sans); margin-top:14px;">Sent privately</div>
            <div style="font:400 11.5px/1.55 var(--sans); color:var(--tx2); margin-top:6px; max-width:200px;">Nothing about this transfer is visible on-chain — amount and recipient stay hidden.</div>
          </div>
          <div style="border:1px solid var(--bd); border-radius:13px; background:var(--panel); overflow:hidden; margin-bottom:14px;">
            <div class="rev" style="border-top:none; padding:12px 14px;">Amount<b>−25.00 USDC</b></div>
            <div class="rev" style="padding:12px 14px;">To<b>zkf1p…k29m</b></div>
            <div class="rev" style="padding:12px 14px;">Status<b style="color:var(--pos);">● Settled</b></div>
          </div>
          <button class="prim" style="width:100%; margin-bottom:9px;">Done</button>
          <button class="ghost" style="width:100%;">View in activity</button>
        </div>
      </div>
</div></body></html>
