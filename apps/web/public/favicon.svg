<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="coin"><circle cx="32" cy="32" r="31"/></clipPath>
    <linearGradient id="peri" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8a9bff"/>
      <stop offset="1" stop-color="#5E7CFA"/>
    </linearGradient>
    <pattern id="hatch" width="7" height="7" patternTransform="rotate(120)" patternUnits="userSpaceOnUse">
      <rect width="7" height="7" fill="none"/>
      <rect x="5" width="1.4" height="7" fill="rgba(255,255,255,.5)"/>
    </pattern>
  </defs>
  <g clip-path="url(#coin)">
    <rect width="32" height="64" fill="#1b1a24"/>
    <rect x="32" width="32" height="64" fill="url(#peri)"/>
    <rect x="32" width="32" height="64" fill="url(#hatch)"/>
  </g>
  <circle cx="32" cy="32" r="30.5" fill="none" stroke="rgba(255,255,255,.16)" stroke-width="1.5"/>
</svg>
