<!DOCTYPE html><html><head><meta charset="utf-8"><style>
html,body{margin:0;background:#0c0d0f}
.wrap{width:100vw;height:100vh;display:grid;place-items:center}
.coin{width:62vmin;height:62vmin;border-radius:50%;overflow:hidden;display:flex;border:1.2vmin solid rgba(255,255,255,.1);box-shadow:0 0 18vmin rgba(94,124,250,.5)}
.coin .l{flex:1;background:#1b1a24}
.coin .r{flex:1;background:linear-gradient(135deg,#8a9bff,#5E7CFA);position:relative;overflow:hidden}
.coin .r::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(120deg,transparent 0 3.4vmin,rgba(255,255,255,.5) 3.4vmin 4.2vmin)}
</style></head><body><div class="wrap"><span class="coin"><span class="l"></span><span class="r"></span></span></div></body></html>
